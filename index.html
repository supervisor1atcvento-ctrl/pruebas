<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Consulta Agencias y VIN - Detalle</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* 
  ESTÁNDARES INSTITUCIONALES VENTO
  Tipografía: Segoe UI
  Colores: Blanco (50%), Negro (30%), Gris (15%), Naranja (5%)
*/
:root {
  --vento-white: #FFFFFF;
  --vento-black: #231F20;
  --vento-gray: #616160;
  --vento-orange: #F28F17;
  --vento-green: #10b981; /* Regla especial: Positivo / Garantía */
}

body { 
  font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
  background-color: var(--vento-white); 
  margin: 0; 
  padding: 40px; 
  color: var(--vento-black); 
  font-size: 28px; /* Contenido - Segoe UI 28 */
}

/* Encabezado */
.hub-header { 
  background-color: var(--vento-white); 
  color: var(--vento-black); 
  padding: 20px 0; 
  border-bottom: 8px solid var(--vento-black); 
  margin-bottom: 40px; 
  display: flex; 
  justify-content: space-between; 
  align-items: flex-end; 
  position: relative;
}

/* Detalle naranja decorativo del 5% */
.hub-header::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 15%;
  height: 8px;
  background-color: var(--vento-orange);
}

.brand-title { 
  font-size: 28px; /* Contenido */
  font-weight: 600; /* Semibold */
  color: var(--vento-gray); 
  text-transform: uppercase; 
  margin-bottom: 5px;
}

.hub-title { 
  font-size: 38px; /* Título - Segoe UI 38 */
  font-weight: bold; /* Negritas */
  color: var(--vento-black);
  margin: 0;
}

/* Buscador */
.search-container { 
  background: var(--vento-white); 
  padding: 0 0 30px 0; 
  text-align: left; 
}

.input-box input { 
  padding: 15px 25px; 
  border: 3px solid var(--vento-gray); 
  border-radius: 8px; 
  font-size: 28px; /* Contenido */
  font-family: 'Segoe UI', sans-serif;
  width: 100%; 
  max-width: 800px; 
  outline: none; 
  transition: border-color 0.3s ease; 
  color: var(--vento-black);
}

.input-box input:focus { 
  border-color: var(--vento-orange); 
}

/* Grid de Tarjetas (Ajustado para tipografía grande) */
#kiosco-container { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); 
  gap: 25px; 
}

.kiosco-card { 
  background: var(--vento-white); 
  border-radius: 8px; 
  padding: 25px; 
  border: 2px solid var(--vento-gray); 
  cursor: pointer; 
  transition: all 0.2s ease; 
  display: flex; 
  flex-direction: column; 
}

.kiosco-card:hover { 
  transform: translateY(-4px); 
  border-color: var(--vento-orange); 
  box-shadow: 0 10px 20px rgba(35, 31, 32, 0.1); /* Sombra usando el negro institucional al 10% */
}

.kiosco-card.selected { 
  border-color: var(--vento-orange); 
  border-width: 3px;
}

.card-header {
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--vento-gray);
}

.card-name { 
  font-size: 32px; /* Subtítulo - Segoe UI 32 */
  font-weight: 600; /* Semibold */
  color: var(--vento-black); 
  line-height: 1.2;
}

.card-data-row { 
  font-size: 28px; /* Contenido - Segoe UI 28 */
  margin-bottom: 15px; 
  color: var(--vento-gray);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-data-row span:first-child {
  font-weight: 600; /* Resalta las etiquetas */
}

.badge-orange { background-color: var(--vento-orange); color: var(--vento-white); padding: 5px 15px; border-radius: 6px; font-weight: bold;}
.badge-dark { background-color: var(--vento-black); color: var(--vento-white); padding: 5px 15px; border-radius: 6px; font-weight: bold;}

/* Modal */
.overlay-blur { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(35, 31, 32, 0.6); backdrop-filter: blur(4px); z-index: 999; display: none; }

.panel-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; max-width: 90vw; background: var(--vento-white); color: var(--vento-black); border-radius: 8px; box-shadow: 0 20px 50px rgba(35, 31, 32, 0.4); z-index: 1000; display: none; flex-direction: column; overflow: hidden; border: 4px solid var(--vento-black); }

.modal-header { background: var(--vento-white); color: var(--vento-black); padding: 25px 30px; display:flex; justify-content:space-between; align-items:center; border-bottom: 4px solid var(--vento-orange); }

.modal-header-title { font-size: 32px; font-weight: 600; color: var(--vento-black); } /* Subtítulo - Segoe UI 32 */

.modal-body { padding: 30px; max-height: 70vh; overflow-y: auto; }

.modal-close { background: none; border: none; color: var(--vento-gray); font-size: 38px; cursor: pointer; transition: color 0.2s; }
.modal-close:hover { color: var(--vento-orange); }

.input-vin { width: 100%; padding: 15px 20px; border-radius: 8px; border: 3px solid var(--vento-gray); background: var(--vento-white); color: var(--vento-black); margin-top: 15px; margin-bottom: 10px; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; font-size: 28px; outline: none; text-transform: uppercase; }
.input-vin:focus { border-color: var(--vento-orange); }

/* Cajas de Resultados y Alertas */
.result-box { margin-top: 20px; padding: 25px; border-radius: 8px; background: var(--vento-white); border: 2px solid var(--vento-gray); font-size: 28px; color: var(--vento-black); display: none; line-height: 1.4; }
.result-box.warn { border-color: var(--vento-orange); border-left: 10px solid var(--vento-orange); }
.result-box.error { background: var(--vento-black); border-color: var(--vento-black); color: var(--vento-white); border-left: 10px solid var(--vento-orange); }

.detalle-accion-container { background: var(--vento-white); padding: 20px; border-radius: 8px; border-left: 10px solid var(--vento-orange); margin-bottom: 30px; border-top: 2px solid var(--vento-gray); border-right: 2px solid var(--vento-gray); border-bottom: 2px solid var(--vento-gray); }

.small-note { font-size: 22px; color: var(--vento-gray); margin-top: 15px; font-style: italic; text-align: left; }

</style>
</head>
<body>

<div class="hub-header">
  <div>
    <div class="brand-title">VENTO MOTORCYCLES U.S.A. - POSTVENTA</div>
    <div class="hub-title">CONSULTA DE AGENCIAS Y VIN</div>
  </div>
  <div id="reloj" style="font-size: 28px; font-weight: 600; color: var(--vento-gray);"></div>
</div>

<div class="search-container">
  <div class="input-box">
    <input type="text" id="input-agencia" placeholder="Escribe el nombre de la agencia a buscar..." onkeyup="filtrarKiosco()">
  </div>
</div>

<div id="kiosco-container">
  <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--vento-black); font-weight: 600; font-size: 32px;">
    <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--vento-orange); margin-right: 15px;"></i> Sincronizando bases de datos...
  </div>
</div>

<div class="overlay-blur" id="overlay" onclick="cerrarModal()"></div>
<div class="panel-modal" id="modal">
  <div class="modal-header">
    <div id="modal-titulo" class="modal-header-title">Agencia</div>
    <div>
      <button class="modal-close" onclick="cerrarModal()" title="Cerrar"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div class="modal-body">
    <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 25px;">
      <div id="modal-badge-rev" style="font-size: 28px;"></div>
    </div>
    
    <div class="detalle-accion-container">
      <div style="font-size:24px; text-transform: uppercase; font-weight: bold; color: var(--vento-gray); margin-bottom: 10px;">Acción Base Dictaminada</div>
      <div id="detalle-accion" style="font-size:32px; font-weight: bold;"></div>
    </div>

    <label style="display:block; font-weight:bold; color:var(--vento-black); font-size: 32px;">Búsqueda de VIN en Base "Proyecto S"</label>
    <input type="text" id="input-vin-modal" class="input-vin" placeholder="Ingresa los 17 caracteres..." onkeyup="auditarVinEnModal()">
    
    <div id="resultado-vin-box" class="result-box"></div>
    <div class="small-note">Recuerda: El VIN debe tener exactamente 17 caracteres alfanuméricos.</div>
  </div>
</div>

<script>
// ==========================================
// CONFIGURACIÓN DE COLUMNAS
// ==========================================
const COL_AGENCIA_NOMBRE = 1;   // Columna B
const COL_ACCION_BASE = 13;     // Columna N (Índice 13)
const COL_PUEDE_REPORTAR = 14;  // Columna O
// ==========================================

const sheetId = '1ZV84x-E4d_iJz7An7aKQ5qjyK6p0vil81GGqrJbmLJY';
const urlAgencias = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Agencias`;
const urlSeries = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=Proyecto+S`;

let cacheSeries = [];
let agenciaActiva = null;

window.onload = () => {
  fetch(urlAgencias).then(r => r.text()).then(csv => procesarAgencias(csv)).catch(e => console.error(e));
  fetch(urlSeries).then(r => r.text()).then(csv => procesarSeries(csv)).catch(e => console.error(e));
  setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
};

function parsearLineaCSV(linea) {
  let resultado = [];
  let comillas = false;
  let celda = '';
  for (let i = 0; i < linea.length; i++) {
    let char = linea[i];
    if (char === '"') { comillas = !comillas; }
    else if (char === ',' && !comillas) { resultado.push(celda.trim()); celda = ''; }
    else { celda += char; }
  }
  resultado.push(celda.trim());
  return resultado;
}

function procesarAgencias(texto) {
  const lineas = texto.split(/\r?\n/);
  const container = document.getElementById('kiosco-container');
  container.innerHTML = '';
  
  for(let i = 1; i < lineas.length; i++) {
    if(!lineas[i]) continue;
    const col = parsearLineaCSV(lineas[i]);
    
    if(col.length <= COL_AGENCIA_NOMBRE || !col[COL_AGENCIA_NOMBRE]) continue;
    
    const nombre = col[COL_AGENCIA_NOMBRE].replace(/"/g, '').trim();
    let accionFinal = (col[COL_ACCION_BASE] || '').replace(/"/g, '').trim();
    if(accionFinal === '') accionFinal = 'No especificada';
    
    const puede = (col[COL_PUEDE_REPORTAR] || '').replace(/"/g, '').trim().toUpperCase();
    
    const card = document.createElement('div');
    card.className = 'kiosco-card';
    card.setAttribute('data-search', nombre.toLowerCase());
    
    const classPuede = (puede === 'SI') ? 'badge-orange' : 'badge-dark';
    const txtPuede = (puede === 'SI') ? 'SÍ REPORTA' : 'NO REPORTA';
    
    const esGarantia = accionFinal.toUpperCase().includes('PASA COMO GARANTIA');
    const colorAccionStyle = esGarantia ? `color: var(--vento-green); font-weight: bold;` : `color: var(--vento-black);`;
    
    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${nombre}</div>
      </div>
      <div class="card-data-row">
        <span>Acción Base:</span>
        <span style="text-align: right; ${colorAccionStyle}">${accionFinal}</span>
      </div>
      <div class="card-data-row">
        <span>Rev. General:</span>
        <span class="${classPuede}">${txtPuede}</span>
      </div>
    `;
    
    card.onclick = () => {
      document.querySelectorAll('.kiosco-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      agenciaActiva = { nombre, accionBase: accionFinal, puede, txtPuede, classPuede, esGarantia };
      abrirModalConAgencia();
    };
    container.appendChild(card);
  }
}

function procesarSeries(texto) {
  const lineas = texto.split(/\r?\n/);
  for(let i = 1; i < lineas.length; i++) {
    if(!lineas[i]) continue;
    const col = parsearLineaCSV(lineas[i]);
    if(col.length <= 5 || !col[5]) continue;
    cacheSeries.push({
      vin: (col[5] || '').replace(/"/g, '').trim().toLowerCase(),
      originalVin: (col[5] || '').replace(/"/g, '').trim(),
      modelo: (col[3] || '').replace(/"/g, '').trim(),
      fechaRecepcion: (col[7] || '').replace(/"/g, '').trim(),
      accion: (col[11] || '').replace(/"/g, '').trim()
    });
  }
}

function filtrarKiosco() {
  const val = document.getElementById('input-agencia').value.trim().toLowerCase();
  document.querySelectorAll('.kiosco-card').forEach(c => {
    const match = c.getAttribute('data-search').includes(val);
    c.style.display = (val === '' || match) ? 'flex' : 'none';
  });
}

function abrirModalConAgencia() {
  if(!agenciaActiva) return;
  document.getElementById('modal-titulo').innerText = agenciaActiva.nombre;
  document.getElementById('modal-badge-rev').innerHTML = `<span class="${agenciaActiva.classPuede}">${agenciaActiva.txtPuede}</span>`;
  
  const detalleAccion = document.getElementById('detalle-accion');
  detalleAccion.innerText = agenciaActiva.accionBase;
  
  if(agenciaActiva.esGarantia) {
    detalleAccion.style.color = 'var(--vento-green)';
  } else {
    detalleAccion.style.color = 'var(--vento-black)';
  }
  
  document.getElementById('input-vin-modal').value = '';
  const rb = document.getElementById('resultado-vin-box');
  rb.style.display = 'none';
  rb.className = 'result-box';
  rb.innerHTML = '';
  
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('input-vin-modal').focus(), 120);
}

function cerrarModal() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('modal').style.display = 'none';
  document.querySelectorAll('.kiosco-card').forEach(c => c.classList.remove('selected'));
  agenciaActiva = null;
}

function limpiarVIN(v) {
  return v.replace(/[\s\-]/g, '').replace(/[^a-zA-Z0-9]/g, '');
}

function auditarVinEnModal() {
  const raw = document.getElementById('input-vin-modal').value;
  const vinClean = limpiarVIN(raw).toLowerCase();
  const respuestaBox = document.getElementById('resultado-vin-box');
  
  if(vinClean.length === 0) { respuestaBox.style.display = 'none'; respuestaBox.className = 'result-box'; respuestaBox.innerHTML = ''; return; }
  
  if (vinClean.length < 17) {
    const faltan = 17 - vinClean.length;
    respuestaBox.style.display = 'block';
    respuestaBox.className = 'result-box warn';
    respuestaBox.innerHTML = `⚠️ <b>VIN incompleto:</b> faltan <b>${faltan}</b> dígitos.`;
    return;
  }
  
  if (vinClean.length > 17) {
    respuestaBox.style.display = 'block';
    respuestaBox.className = 'result-box warn';
    respuestaBox.innerHTML = `⚠️ <b>VIN excedido:</b> contiene <b>${vinClean.length}</b> caracteres (Solo 17).`;
    return;
  }
  
  const registro = cacheSeries.find(s => s.vin === vinClean || s.vin.includes(vinClean));
  respuestaBox.style.display = 'block';
  
  if (registro) {
    respuestaBox.className = 'result-box';
    respuestaBox.innerHTML = `
      <div style="font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid var(--vento-gray); padding-bottom: 10px; color: var(--vento-green);">✅ Unidad Localizada</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div><b style="color: var(--vento-gray); font-size: 22px; text-transform: uppercase;">Modelo</b><br> <span>${registro.modelo || 'N/A'}</span></div>
        <div><b style="color: var(--vento-gray); font-size: 22px; text-transform: uppercase;">VIN</b><br> <span>${registro.originalVin}</span></div>
        <div><b style="color: var(--vento-gray); font-size: 22px; text-transform: uppercase;">Recepción</b><br> <span>${registro.fechaRecepcion || 'N/A'}</span></div>
        <div><b style="color: var(--vento-gray); font-size: 22px; text-transform: uppercase;">Dictamen</b><br> <span>${registro.accion || 'N/A'}</span></div>
      </div>
    `;
  } else {
    respuestaBox.className = 'result-box error';
    respuestaBox.innerHTML = `
      <div style="font-weight: bold; font-size: 32px; margin-bottom: 10px; color: var(--vento-orange);">❌ VIN no localizado</div>
      <div>Será necesario solicitar el <b>Check List</b> y cotización correspondiente a la agencia para continuar.</div>
    `;
  }
}
</script>
</body>
</html>
