<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Directorio Post Venta - Zonificación completa (pestañas ampliadas)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<style>
:root{
  --primary:#d32f2f;
  --muted:#6b6b6b;
  --bg:#f4f6f8;
  --card:#fff;
  --border:#e6e6e6;
  --info:#0288d1;
  --warning:#f57c00;
  --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);margin:0;padding:20px;color:#222}
.container{max-width:1200px;margin:0 auto;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:#222;color:#fff}
.header h1{margin:0;font-size:20px;border-left:4px solid var(--primary);padding-left:10px}
.controls{padding:16px;border-bottom:1px solid var(--border);background:#fafafa;display:flex;gap:12px;flex-wrap:wrap}
.control{display:flex;flex-direction:column;min-width:200px}
.control label{font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
select,input[type="text"]{padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.table-wrap{padding:18px;overflow:auto}
.table-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}
.badge{background:rgba(255,255,255,0.08);padding:6px 10px;border-radius:999px;color:#fff;font-weight:600}
.table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{position:sticky;top:0;background:#222;color:#fff;font-size:12px;text-transform:uppercase}
tr:hover{background:#fbfbfb}
.role-badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;color:#fff}
.role-supervisor{background:var(--info)}
.role-asesor{background:var(--primary)}
.role-gerente{background:var(--warning)}
.small{font-size:12px;color:var(--muted)}
.highlight{background:linear-gradient(90deg, rgba(255,235,59,0.2), transparent);padding:2px 4px;border-radius:3px}
.details{background:#fafafa;padding:12px;border-radius:6px;margin-top:8px;border:1px solid var(--border)}
@media(max-width:800px){
  .controls{flex-direction:column}
  th,td{font-size:12px;padding:8px}
}
</style>
</head>
<body>
<div class="container" role="application" aria-label="Directorio Post Venta">
  <div class="header">
    <h1>Directorio Post Venta</h1>
    <div class="badge" id="record-count">0 registros</div>
  </div>

  <div class="controls" aria-hidden="false">
    <div class="control">
      <label for="area-select">Seleccionar Pestaña</label>
      <select id="area-select" aria-label="Seleccionar pestaña">
        <option value="ATENCION A CLIENTES">Atención a Clientes</option>
        <option value="REPARACIONES TIENDAS">Reparaciones Tiendas</option>
        <option value="REPARACIONES AGENCIAS">Reparaciones Agencias</option>
        <option value="REPARACIONES CEDIS">Reparaciones CEDIS</option>
        <option value="ARMADOS Y ACTIVADOS">Armados y Activados</option>
        <option value="GARANTIAS">Garantías</option>
        <option value="COTIZACIONES">Cotizaciones</option>
        <option value="PAGOS A CESVE">Pagos a CESVE</option>
        <option value="REGIONALES">Regionales</option>
        <option value="VENTOMAN COPPEL">Ventoman Coppel</option>
        <option value="VENTOMAN VENTO">Ventoman Vento</option>
        <!-- Pestañas adicionales solicitadas -->
        <option value="INGENIERIA POSTVENTA">INGENIERIA POSTVENTA</option>
        <option value="STAFF">STAFF</option>
        <option value="AMERICAN PISTON">AMERICAN PISTON</option>
        <option value="REFACCIONES">REFACCIONES</option>
        <option value="STAFF - COMPLETO">STAFF - COMPLETO</option>
      </select>
    </div>

    <div class="control" style="flex:1">
      <label for="search-input">Buscar persona, correo o rol</label>
      <input type="text" id="search-input" placeholder="Escribe para buscar..." aria-label="Buscar persona correo o rol">
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-actions">
      <div class="small">Vista completa (zonificación consolidada)</div>
      <div class="small" id="info-note">Se concatenan columnas que pertenecen al mismo encabezado (ej. ZONIFICACION)</div>
    </div>

    <div id="loader" class="small">Conectando y descargando datos desde Google Sheets...</div>

    <table id="data-table" class="table" style="display:none" aria-live="polite">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>

    <div id="detail-panel" style="display:none" class="details" aria-hidden="true"></div>
  </div>
</div>

<script>
/* CONFIGURACIÓN: cambiar SHEET_ID si necesitas apuntar a otra hoja */
const SHEET_ID = '1LfMR89SNg0fj1361_Qj1hBqNa35eteulkstloqSdWVw';

let currentData = [], currentHeaders = [], filteredData = [];

const areaSelect = document.getElementById('area-select');
const searchInput = document.getElementById('search-input');
const table = document.getElementById('data-table');
const thead = document.getElementById('table-head');
const tbody = document.getElementById('table-body');
const loader = document.getElementById('loader');
const recordCount = document.getElementById('record-count');
const detailPanel = document.getElementById('detail-panel');

/* Rellena celdas vacías que provienen de celdas combinadas */
function fillMergedCells(rawData) {
  if (!rawData || rawData.length === 0) return rawData;
  const numRows = rawData.length;
  const numCols = Math.max(...rawData.map(r => r.length));
  for (let i = 0; i < numRows; i++) {
    rawData[i] = rawData[i] || [];
    for (let j = 0; j < numCols; j++) {
      if (typeof rawData[i][j] === 'undefined') rawData[i][j] = '';
    }
  }
  for (let col = 0; col < numCols; col++) {
    let last = '';
    for (let row = 0; row < numRows; row++) {
      if (rawData[row][col] !== '' && rawData[row][col] !== null) {
        last = rawData[row][col];
      } else {
        rawData[row][col] = last;
      }
    }
  }
  return rawData;
}

/* Excluir filas por nombre exacto o que contengan la frase (incluye ANALISTA) */
function isExcludedRow(row) {
  if (!row) return false;
  const excludeList = [
    'ESPECIALISTAS DE REPARACIONES',
    'SOPORTE TECNCO - GARANTIAS MOTOR, TRANSMISION Y BATERIAS'
  ];
  const nameFields = ['NOMBRE','NOMBRE COMPLETO','ASESOR','ANALISTA'];
  for (const f of nameFields) {
    const v = (row[f] || '').toString().trim().toUpperCase();
    if (!v) continue;
    for (const ex of excludeList) {
      const exNorm = ex.toString().trim().toUpperCase();
      if (v === exNorm) return true;
      if (v.includes(exNorm)) return true;
    }
  }
  return false;
}

/* Normaliza encabezados: propaga encabezados vacíos hacia la derecha.
   Si la primera columna no tiene encabezado, la dejamos vacía y la eliminamos más adelante. */
function normalizeHeaders(rawHeaderRow) {
  const headers = rawHeaderRow.map(h => (h || '').toString().trim());
  for (let i = 0; i < headers.length; i++) {
    if (!headers[i] || headers[i] === '') {
      headers[i] = i > 0 ? headers[i-1] : ''; // no crear COL_0, dejar vacío si es la primera
    }
  }
  return headers;
}

/* Construye objetos de fila concatenando valores de columnas que comparten el mismo encabezado.
   Ignora columnas cuyo encabezado quedó vacío (evita col_0). */
function buildRowsFromRaw(rawRows, headers) {
  const rows = [];
  for (let r = 0; r < rawRows.length; r++) {
    const raw = rawRows[r];
    const rowObj = {};
    for (let c = 0; c < headers.length; c++) {
      const key = headers[c] || ''; // puede ser '' si encabezado vacío
      if (!key) continue; // ignorar columnas sin encabezado
      const val = (raw[c] || '').toString().trim();
      if (!rowObj[key]) {
        rowObj[key] = val;
      } else {
        if (val && val.length > 0) {
          const existing = rowObj[key];
          if (!existing.split(',').map(s=>s.trim()).includes(val)) {
            rowObj[key] = existing ? `${existing}, ${val}` : val;
          }
        }
      }
    }
    rows.push(rowObj);
  }
  return rows;
}

/* Carga la pestaña indicada y procesa filas (zonificación consolidada) */
function loadData(sheetName) {
  loader.style.display = 'block';
  table.style.display = 'none';
  detailPanel.style.display = 'none';
  searchInput.value = '';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  Papa.parse(url, {
    download: true, header: false, skipEmptyLines: true,
    complete: function(results) {
      let rawData = results.data || [];
      rawData = fillMergedCells(rawData);

      // Buscar fila de encabezado (misma heurística que antes)
      let headerRowIndex = -1;
      for (let i = 0; i < Math.min(10, rawData.length); i++) {
        const rowStr = rawData[i].join("").toUpperCase();
        if (rowStr.includes("CORREO") || rowStr.includes("ASESOR") || rowStr.includes("GERENTE") || rowStr.includes("NOMBRE") || rowStr.includes("ANALISTA")) {
          headerRowIndex = i;
          break;
        }
      }

      if (headerRowIndex !== -1) {
        // Normalizar encabezados propagando vacíos
        const rawHeaderRow = rawData[headerRowIndex];
        const headers = normalizeHeaders(rawHeaderRow);
        // Construir rawRows (filas de datos) con la misma longitud de columnas
        const rawRows = [];
        for (let r = headerRowIndex + 1; r < rawData.length; r++) {
          rawRows.push(rawData[r]);
        }
        // Convertir filas crudas en objetos concatenando columnas con mismo encabezado
        const builtRows = buildRowsFromRaw(rawRows, headers);
        // Filtrar filas vacías y excluir nombres no deseados
        const nonEmpty = builtRows.filter(row => {
          const hasData = Object.values(row).some(v => v && v.toString().trim() !== '');
          return hasData && !isExcludedRow(row);
        });
        currentData = nonEmpty;
        // Recalcular currentHeaders en base a keys del primer registro si existe
        if (currentData.length > 0) {
          const keys = Object.keys(currentData[0]);
          currentHeaders = keys;
        } else {
          currentHeaders = headers.filter(h => h && h !== '');
        }
      } else {
        currentHeaders = [];
        currentData = [];
      }

      filteredData = currentData.slice();
      renderTableAll();
      loader.style.display = 'none';
      table.style.display = 'table';
    },
    error: function(err) {
      loader.innerHTML = '<span style="color:#d32f2f;">No se pudo conectar. Verifica permisos de lectura.</span>';
      console.error(err);
    }
  });
}

/* Renderiza toda la tabla (sin paginación) */
function renderTableAll() {
  thead.innerHTML = '<tr>' + currentHeaders.filter(h=>h).map(h => `<th data-col="${h}">${h}</th>`).join('') + '</tr>';
  tbody.innerHTML = filteredData.map((row, idx) => {
    const nombre = row['NOMBRE'] || row['NOMBRE COMPLETO'] || row['ASESOR'] || '';
    const rol = row['ROL'] || row['PUESTO'] || '';
    const zon = row['ZONIFICACION'] || row['ZONIFICACIÓN'] || '';
    const roleClass = (rol.toLowerCase().includes('supervisor')) ? 'role-supervisor' : (rol.toLowerCase().includes('asesor') ? 'role-asesor' : 'role-gerente');
    return `<tr data-idx="${idx}">
      ${currentHeaders.filter(h=>h).map(h => {
        const val = row[h] || '';
        const q = (searchInput.value||'').trim().toLowerCase();
        const display = q && val.toString().toLowerCase().includes(q) ? val.toString().replace(new RegExp(q,'ig'), m=>`<span class="highlight">${m}</span>`) : val;
        if (h.toUpperCase().includes('ROL') || h.toUpperCase().includes('PUESTO')) {
          return `<td><span class="role-badge ${roleClass}">${display}</span></td>`;
        }
        if (h.toUpperCase().includes('NOMBRE') || h.toUpperCase().includes('ASESOR')) {
          return `<td><strong>${display}</strong>${rol ? `<div class="small">${rol}</div>` : ''}</td>`;
        }
        if (h.toUpperCase().includes('CORREO') || h.toUpperCase().includes('EMAIL')) {
          return `<td><a href="mailto:${val}" class="small">${display}</a></td>`;
        }
        if (h.toUpperCase().includes('ZON') || h.toUpperCase().includes('ZONIFIC')) {
          return `<td class="small">${display}</td>`;
        }
        return `<td>${display}</td>`;
      }).join('')}
    </tr>`;
  }).join('');
  recordCount.innerText = `${filteredData.length} registros`;

  Array.from(tbody.querySelectorAll('tr')).forEach((tr) => {
    tr.addEventListener('click', (e) => {
      const idx = parseInt(tr.getAttribute('data-idx'),10);
      showDetails(filteredData[idx]);
    });
  });
}

/* Panel de detalle */
function showDetails(row) {
  if (!row) { detailPanel.style.display='none'; detailPanel.setAttribute('aria-hidden','true'); return; }
  const email = row['CORREO'] || row['EMAIL'] || '';
  const tel = row['TEL'] || row['TELEFONO'] || row['CELULAR'] || '';
  const zon = row['ZONIFICACION'] || row['ZONIFICACIÓN'] || '';
  const horario = row['HORARIO'] || row['DISPONIBILIDAD'] || '';
  const notas = row['NOTAS'] || row['COMENTARIOS'] || '';
  detailPanel.innerHTML = `<strong>${row['NOMBRE'] || row['ASESOR'] || ''}</strong>
    <div class="small">Rol: ${row['ROL'] || row['PUESTO'] || ''}</div>
    ${zon ? `<div style="margin-top:6px"><strong>Zonificación</strong>: ${zon}</div>` : ''}
    <div style="margin-top:8px"><strong>Correo</strong>: <a href="mailto:${email}">${email}</a></div>
    <div style="margin-top:6px"><strong>Teléfono</strong>: ${tel}</div>
    ${horario ? `<div style="margin-top:6px"><strong>Horario</strong>: ${horario}</div>` : ''}
    ${notas ? `<div style="margin-top:8px"><strong>Notas</strong>: ${notas}</div>` : ''}
  `;
  detailPanel.style.display = 'block';
  detailPanel.setAttribute('aria-hidden','false');
}

/* Filtrado por búsqueda */
function applyFilter() {
  const q = (searchInput.value || '').trim().toLowerCase();
  if (!q) { filteredData = currentData.slice(); renderTableAll(); return; }
  filteredData = currentData.filter(row => {
    return Object.values(row).some(v => (v||'').toString().toLowerCase().includes(q));
  });
  renderTableAll();
}

/* Eventos */
searchInput.addEventListener('input', () => {
  clearTimeout(window._deb);
  window._deb = setTimeout(applyFilter, 180);
});
areaSelect.addEventListener('change', (e) => loadData(e.target.value));

/* Carga inicial: pestaña por defecto (la primera opción del selector) */
loadData(areaSelect.value);

/* Atajo accesible */
document.addEventListener('keydown', (e) => {
  if (e.altKey && e.key === 'f') { e.preventDefault(); searchInput.focus(); }
});
</script>
</body>
</html>
