<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Directorio Post Venta - Profesional</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<style>
:root{
  --primary:#d32f2f;
  --muted:#6b6b6b;
  --bg:#f4f6f8;
  --card:#fff;
  --border:#e6e6e6;
  --success:#2e7d32;
  --info:#0288d1;
  --warning:#f57c00;
  --font: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);margin:0;padding:20px;color:#222}
.container{max-width:1200px;margin:0 auto;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:#222;color:#fff}
.header h1{margin:0;font-size:20px;border-left:4px solid var(--primary);padding-left:10px}
.controls{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:#fafafa}
.control{display:flex;flex-direction:column;min-width:200px}
.control label{font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
input[type="text"],select{padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.table-wrap{padding:18px;overflow:auto}
.table-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}
.badge{background:rgba(255,255,255,0.08);padding:6px 10px;border-radius:999px;color:#fff;font-weight:600}
.table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
th{position:sticky;top:0;background:#222;color:#fff;font-size:12px;text-transform:uppercase}
tr:hover{background:#fbfbfb}
.role-badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;color:#fff}
.role-supervisor{background:var(--info)}
.role-asesor{background:var(--primary)}
.role-gerente{background:var(--warning)}
.small{font-size:12px;color:var(--muted)}
.actions button{margin-right:6px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer}
.pager{display:flex;gap:8px;align-items:center}
.pager button{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer}
.highlight{background:linear-gradient(90deg, rgba(255,235,59,0.2), transparent);padding:2px 4px;border-radius:3px}
.details{background:#fafafa;padding:12px;border-radius:6px;margin-top:8px;border:1px solid var(--border)}
@media(max-width:800px){
  .controls{flex-direction:column}
  th,td{font-size:12px;padding:8px}
}
.copy-btn{background:transparent;border:none;color:var(--info);cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div class="container" role="application" aria-label="Directorio Post Venta">
  <div class="header">
    <h1>Directorio Post Venta</h1>
    <div class="badge" id="record-count">0 registros</div>
  </div>

  <div class="controls" aria-hidden="false">
    <div class="control">
      <label for="area-select">Seleccionar Área</label>
      <select id="area-select" aria-label="Seleccionar área">
        <option value="ATENCION A CLIENTES">Atención a Clientes</option>
        <option value="REPARACIONES TIENDAS">Reparaciones Tiendas</option>
        <option value="REPARACIONES AGENCIAS">Reparaciones Agencias</option>
        <option value="REPARACIONES CEDIS">Reparaciones CEDIS</option>
        <option value="ARMADOS Y ACTIVADOS">Armados y Activados</option>
        <option value="GARANTIAS">Garantías</option>
        <option value="COTIZACIONES">Cotizaciones</option>
        <option value="PAGOS A CESVE">Pagos a CESVE</option>
        <option value="REGIONALES">Regionales</option>
        <option value="VENTOMAN COPPEL">Ventoman Coppel</option>
        <option value="VENTOMAN VENTO">Ventoman Vento</option>
      </select>
    </div>

    <div class="control" style="flex:1">
      <label for="search-input">Buscar persona, correo o rol</label>
      <input type="text" id="search-input" placeholder="Escribe para buscar..." aria-label="Buscar persona correo o rol">
    </div>

    <div class="control" style="min-width:140px">
      <label for="per-page">Filas por página</label>
      <select id="per-page" aria-label="Filas por página">
        <option>10</option><option>25</option><option>50</option>
      </select>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-actions">
      <div class="small">Resultados mostrados</div>
      <div class="pager" aria-label="Paginación">
        <button id="prev-page" aria-label="Página anterior">Anterior</button>
        <div id="page-info" class="small">Página 1</div>
        <button id="next-page" aria-label="Página siguiente">Siguiente</button>
      </div>
    </div>

    <div id="loader" class="small">Conectando y descargando datos desde Google Sheets...</div>

    <table id="data-table" class="table" style="display:none" aria-live="polite">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>

    <div id="detail-panel" style="display:none" class="details" aria-hidden="true"></div>
  </div>
</div>

<script>
const SHEET_ID = '1LfMR89SNg0fj1361_Qj1hBqNa35eteulkstloqSdWVw';
let currentData = [], currentHeaders = [], filteredData = [];
let page = 1, perPage = 10;

const areaSelect = document.getElementById('area-select');
const searchInput = document.getElementById('search-input');
const perPageSelect = document.getElementById('per-page');
const table = document.getElementById('data-table');
const thead = document.getElementById('table-head');
const tbody = document.getElementById('table-body');
const loader = document.getElementById('loader');
const recordCount = document.getElementById('record-count');
const prevBtn = document.getElementById('prev-page');
const nextBtn = document.getElementById('next-page');
const pageInfo = document.getElementById('page-info');
const detailPanel = document.getElementById('detail-panel');

function fillMergedCells(rawData) {
  if (!rawData || rawData.length === 0) return rawData;
  const numRows = rawData.length;
  const numCols = Math.max(...rawData.map(r => r.length));
  for (let i = 0; i < numRows; i++) {
    rawData[i] = rawData[i] || [];
    for (let j = 0; j < numCols; j++) {
      if (typeof rawData[i][j] === 'undefined') rawData[i][j] = '';
    }
  }
  for (let col = 0; col < numCols; col++) {
    let last = '';
    for (let row = 0; row < numRows; row++) {
      if (rawData[row][col] !== '' && rawData[row][col] !== null) {
        last = rawData[row][col];
      } else {
        rawData[row][col] = last;
      }
    }
  }
  return rawData;
}

function loadData(sheetName) {
  loader.style.display = 'block';
  table.style.display = 'none';
  detailPanel.style.display = 'none';
  searchInput.value = '';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  Papa.parse(url, {
    download: true, header: false, skipEmptyLines: true,
    complete: function(results) {
      let rawData = results.data || [];
      rawData = fillMergedCells(rawData);
      let headerRowIndex = -1;
      for (let i = 0; i < Math.min(10, rawData.length); i++) {
        const rowStr = rawData[i].join("").toUpperCase();
        if (rowStr.includes("CORREO") || rowStr.includes("ASESOR") || rowStr.includes("GERENTE") || rowStr.includes("NOMBRE") || rowStr.includes("ANALISTA")) {
          headerRowIndex = i; break;
        }
      }
      if (headerRowIndex !== -1) {
        currentHeaders = rawData[headerRowIndex].map(h => (h||'').toString().trim());
        let parsed = [];
        for (let i = headerRowIndex + 1; i < rawData.length; i++) {
          let rowObj = {}; let hasData = false;
          for (let j = 0; j < currentHeaders.length; j++) {
            if (currentHeaders[j]) {
              rowObj[currentHeaders[j]] = rawData[i][j] || '';
              if (rawData[i][j] && rawData[i][j].toString().trim() !== '') hasData = true;
            }
          }
          if (hasData) parsed.push(rowObj);
        }
        currentData = parsed;
      } else { currentHeaders = []; currentData = []; }
      filteredData = currentData.slice();
      page = 1;
      renderTablePage();
      loader.style.display = 'none';
      table.style.display = 'table';
    },
    error: function(err) {
      loader.innerHTML = '<span style="color:#d32f2f;">No se pudo conectar. Verifica permisos de lectura.</span>';
      console.error(err);
    }
  });
}

function renderTablePage() {
  // Apply pagination
  perPage = parseInt(perPageSelect.value,10);
  const start = (page-1)*perPage;
  const pageItems = filteredData.slice(start, start+perPage);
  renderTable(pageItems);
  recordCount.innerText = `${filteredData.length} registros`;
  pageInfo.innerText = `Página ${page} de ${Math.max(1, Math.ceil(filteredData.length/perPage))}`;
  prevBtn.disabled = page <= 1;
  nextBtn.disabled = page >= Math.ceil(filteredData.length/perPage);
}

function renderTable(data) {
  thead.innerHTML = '<tr>' + currentHeaders.filter(h=>h).map(h => `<th data-col="${h}">${h} <button class="sort-btn" data-col="${h}" aria-label="Ordenar ${h}">⇅</button></th>`).join('') + '</tr>';
  tbody.innerHTML = data.map((row, idx) => {
    // Build a compact row with mailto and copy buttons
    const email = row['CORREO'] || row['EMAIL'] || row['E-MAIL'] || '';
    const nombre = row['NOMBRE'] || row['NOMBRE COMPLETO'] || row['ASESOR'] || '';
    const rol = row['ROL'] || row['PUESTO'] || '';
    const telefono = row['TEL'] || row['TELEFONO'] || row['CELULAR'] || '';
    const roleClass = (rol.toLowerCase().includes('supervisor')) ? 'role-supervisor' : (rol.toLowerCase().includes('asesor') ? 'role-asesor' : 'role-gerente');
    return `<tr data-idx="${idx}">
      ${currentHeaders.filter(h=>h).map(h => {
        const val = row[h] || '';
        // highlight search matches
        const q = (searchInput.value||'').trim().toLowerCase();
        const display = q && val.toString().toLowerCase().includes(q) ? val.toString().replace(new RegExp(q,'ig'), m=>`<span class="highlight">${m}</span>`) : val;
        if (h.toUpperCase().includes('CORREO') || h.toUpperCase().includes('EMAIL')) {
          return `<td><a href="mailto:${val}" class="small">${display}</a> <button class="copy-btn" data-copy="${val}" title="Copiar correo">Copiar</button></td>`;
        }
        if (h.toUpperCase().includes('TEL') || h.toUpperCase().includes('CEL')) {
          return `<td>${display} <button class="copy-btn" data-copy="${val}" title="Copiar teléfono">Copiar</button></td>`;
        }
        if (h.toUpperCase().includes('ROL') || h.toUpperCase().includes('PUESTO')) {
          return `<td><span class="role-badge ${roleClass}">${display}</span></td>`;
        }
        if (h.toUpperCase().includes('NOMBRE') || h.toUpperCase().includes('ASESOR')) {
          return `<td><strong>${display}</strong><div class="small">${rol || ''}</div></td>`;
        }
        return `<td>${display}</td>`;
      }).join('')}
    </tr>`;
  }).join('');
  // Attach row click handlers for details and copy buttons
  Array.from(tbody.querySelectorAll('tr')).forEach((tr, i) => {
    tr.addEventListener('click', (e) => {
      // prevent when clicking copy button
      if (e.target && e.target.classList.contains('copy-btn')) return;
      const globalIdx = (page-1)*perPage + parseInt(tr.getAttribute('data-idx'),10);
      showDetails(filteredData[globalIdx]);
    });
  });
  Array.from(tbody.querySelectorAll('.copy-btn')).forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = btn.getAttribute('data-copy') || '';
      navigator.clipboard.writeText(text || '').then(()=> {
        btn.innerText = 'Copiado';
        setTimeout(()=> btn.innerText = 'Copiar',1200);
      });
    });
  });
  // Sorting buttons
  Array.from(thead.querySelectorAll('.sort-btn')).forEach(b => {
    b.addEventListener('click', (ev) => {
      const col = b.getAttribute('data-col');
      sortByColumn(col);
    });
  });
}

function showDetails(row) {
  if (!row) { detailPanel.style.display='none'; detailPanel.setAttribute('aria-hidden','true'); return; }
  const email = row['CORREO'] || row['EMAIL'] || '';
  const tel = row['TEL'] || row['TELEFONO'] || row['CELULAR'] || '';
  const horario = row['HORARIO'] || row['DISPONIBILIDAD'] || '';
  const notas = row['NOTAS'] || row['COMENTARIOS'] || '';
  detailPanel.innerHTML = `<strong>${row['NOMBRE'] || row['ASESOR'] || ''}</strong>
    <div class="small">Rol: ${row['ROL'] || row['PUESTO'] || ''}</div>
    <div style="margin-top:8px"><strong>Correo</strong>: <a href="mailto:${email}">${email}</a> <button class="copy-btn" data-copy="${email}">Copiar</button></div>
    <div style="margin-top:6px"><strong>Teléfono</strong>: ${tel} <button class="copy-btn" data-copy="${tel}">Copiar</button></div>
    ${horario ? `<div style="margin-top:6px"><strong>Horario</strong>: ${horario}</div>` : ''}
    ${notas ? `<div style="margin-top:8px"><strong>Notas</strong>: ${notas}</div>` : ''}
  `;
  detailPanel.style.display = 'block';
  detailPanel.setAttribute('aria-hidden','false');
  Array.from(detailPanel.querySelectorAll('.copy-btn')).forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.getAttribute('data-copy') || '';
      navigator.clipboard.writeText(text || '');
      btn.innerText = 'Copiado';
      setTimeout(()=> btn.innerText = 'Copiar',1200);
    });
  });
}

function sortByColumn(col) {
  const dir = (table.getAttribute('data-sort-col') === col && table.getAttribute('data-sort-dir') === 'asc') ? 'desc' : 'asc';
  filteredData.sort((a,b) => {
    const va = (a[col]||'').toString().toLowerCase();
    const vb = (b[col]||'').toString().toLowerCase();
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  table.setAttribute('data-sort-col', col);
  table.setAttribute('data-sort-dir', dir);
  page = 1;
  renderTablePage();
}

function applyFilter() {
  const q = (searchInput.value || '').trim().toLowerCase();
  if (!q) { filteredData = currentData.slice(); page = 1; renderTablePage(); return; }
  filteredData = currentData.filter(row => {
    return Object.values(row).some(v => (v||'').toString().toLowerCase().includes(q));
  });
  page = 1;
  renderTablePage();
}

// Pagination controls
prevBtn.addEventListener('click', ()=> { if (page>1) { page--; renderTablePage(); }});
nextBtn.addEventListener('click', ()=> { if (page < Math.ceil(filteredData.length/perPage)) { page++; renderTablePage(); }});
perPageSelect.addEventListener('change', ()=> { page = 1; renderTablePage(); });

// Search debounce
let debounce;
searchInput.addEventListener('input', ()=> {
  clearTimeout(debounce);
  debounce = setTimeout(()=> applyFilter(), 220);
});

// Area change
areaSelect.addEventListener('change', (e)=> loadData(e.target.value));

// Initial load
loadData(areaSelect.value);

// Keyboard shortcuts for accessibility
document.addEventListener('keydown', (e) => {
  if (e.altKey && e.key === 'f') { e.preventDefault(); searchInput.focus(); }
  if (e.altKey && e.key === 'ArrowRight') { if (page < Math.ceil(filteredData.length/perPage)) { page++; renderTablePage(); } }
  if (e.altKey && e.key === 'ArrowLeft') { if (page>1) { page--; renderTablePage(); } }
});
</script>
</body>
</html>
